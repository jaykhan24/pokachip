<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>포카칩 PokaChip — 스토리 이미지 메이커</title>
<meta name="description" content="사진 메타데이터를 자동으로 얹어 인스타그램 스토리 이미지를 만드는 도구">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥔</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Nanum+Myeongjo:wght@400;700&family=Gowun+Dodum&family=Nanum+Pen+Script&family=Black+Han+Sans&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e11; --surface:#17171c; --surface2:#1f1f26; --line:#2a2a33;
  --text:#f2f2f5; --text-dim:#9a9aa6; --accent:#ffd54a; --accent-text:#1a1a1a;
  --radius:14px; --tabbar-h:60px; --header-h:52px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden; user-select:none; -webkit-user-select:none;
}
button{font-family:inherit;border:0;background:none;color:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

/* ---------- 레이아웃 ---------- */
#app{display:flex;flex-direction:column;height:100dvh}
header{
  height:var(--header-h);flex:none;display:flex;align-items:center;gap:10px;
  padding:0 14px;border-bottom:1px solid var(--line);background:var(--surface);
  z-index:30;
}
.logo{display:flex;align-items:baseline;gap:7px;margin-right:auto}
.logo b{font-size:17px;font-weight:700;letter-spacing:-.3px}
.logo span{font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace}
.hbtn{
  height:34px;padding:0 14px;border-radius:10px;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:6px;background:var(--surface2);color:var(--text);
}
.hbtn.primary{background:var(--accent);color:var(--accent-text)}
.hbtn:active{transform:scale(.96)}
.hbtn svg{width:15px;height:15px}

#main{flex:1;display:flex;flex-direction:column;min-height:0;position:relative}
#previewArea{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:14px;min-width:0;position:relative;
}
#stageWrap{position:relative;box-shadow:0 12px 50px rgba(0,0,0,.55);border-radius:12px}
#stage{
  width:1080px;height:1920px;transform-origin:top left;position:absolute;left:0;top:0;
  overflow:hidden;border-radius:24px;background:#111;touch-action:none;cursor:grab;
}
#stage.dragging{cursor:grabbing}

/* 스테이지 레이어 */
#bgLayer{position:absolute;inset:0}
#bgLayer img{position:absolute;left:0;top:0;width:100%;height:100%;object-fit:cover;transform:scale(1.18)}
#bgDim{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none}
#photoCard{position:absolute;overflow:hidden;will-change:left,top,width,height;background:#222}
#photoCard img{position:absolute;max-width:none;pointer-events:none}
#textLayer{position:absolute;inset:0}
.text-el{
  position:absolute;white-space:pre-wrap;line-height:1.35;cursor:grab;
  border:3px dashed transparent;border-radius:10px;max-width:1000px;
}
.text-el.selected{border-color:rgba(255,213,74,.9)}
.text-el.editing{cursor:text;outline:none;border-color:rgba(255,213,74,.9)}

/* 빈 상태 */
#emptyState{
  position:absolute;inset:0;display:flex;flex-direction:column;gap:24px;
  align-items:center;justify-content:center;color:#777;cursor:pointer;
}
#emptyState svg{width:110px;height:110px;opacity:.5}
#emptyState p{font-size:34px;letter-spacing:-.5px}
#emptyState small{font-size:24px;color:#555}

/* 선택 툴바 */
#selBar{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:20;
  display:none;gap:6px;background:rgba(23,23,28,.92);backdrop-filter:blur(10px);
  border:1px solid var(--line);border-radius:12px;padding:5px;
}
#selBar.show{display:flex}
#selBar button{padding:7px 14px;font-size:13px;font-weight:600;border-radius:8px;background:var(--surface2)}
#selBar button.danger{color:#ff6b6b}

/* 스냅 가이드 */
.guide-v{position:absolute;top:0;bottom:0;left:540px;width:2px;margin-left:-1px;background:rgba(255,213,74,.75);display:none;pointer-events:none}
.guide-h{position:absolute;left:0;right:0;top:960px;height:2px;margin-top:-1px;background:rgba(255,213,74,.75);display:none;pointer-events:none}

/* ---------- 하단 도크 (Lightroom 스타일) ---------- */
#dock{flex:none;background:var(--surface);border-top:1px solid var(--line)}
.dock-row{display:flex;gap:8px;overflow-x:auto;padding:10px 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch;align-items:center}
.dock-row::-webkit-scrollbar{display:none}
.dock-row.alt{padding-bottom:0}
.chip-btn{
  flex:none;height:38px;padding:0 14px;border-radius:19px;background:var(--surface2);
  font-size:13px;font-weight:600;color:var(--text-dim);border:1.5px solid transparent;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.chip-btn.on{color:var(--accent);border-color:var(--accent)}
.chip-btn.act{background:#3a3a46;color:var(--text)}
.chip-btn:active{transform:scale(.95)}
.dot{flex:none;width:34px;height:34px;border-radius:50%;border:2px solid var(--line);padding:0}
.dot.on{border-color:var(--accent);transform:scale(1.1)}
.dot.custom{display:flex;align-items:center;justify-content:center;position:relative;background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);overflow:hidden;font-size:14px;cursor:pointer}
.dot.custom input{position:absolute;inset:0;opacity:0;cursor:pointer}
.dock-slider{display:flex;align-items:center;gap:12px;padding:12px 16px 2px}
.dock-slider span{font-size:12px;color:var(--text-dim);flex:none}
#dsLabel{width:52px}
#dsVal{width:48px;text-align:right;font-family:'IBM Plex Mono',monospace}
.dock-slider input{flex:1;accent-color:var(--accent);height:28px}
.dock-slider[hidden],.dock-row[hidden]{display:none}

/* ---------- 탭바 ---------- */
#tabbar{
  flex:none;height:calc(var(--tabbar-h) + var(--safe-b));padding-bottom:var(--safe-b);
  display:flex;background:var(--surface);border-top:1px solid var(--line);z-index:30;
}
#tabbar button{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  font-size:10.5px;color:var(--text-dim);font-weight:500;
}
#tabbar button svg{width:21px;height:21px}
#tabbar button.on{color:var(--accent)}

/* 토스트 */
#toast{
  position:fixed;left:50%;bottom:calc(var(--tabbar-h) + var(--safe-b) + 128px);transform:translateX(-50%) translateY(20px);
  background:rgba(240,240,245,.96);color:#111;padding:10px 18px;border-radius:12px;
  font-size:13.5px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;z-index:99;
  max-width:85vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- PC 레이아웃 ---------- */
@media(min-width:900px){
  #previewArea{padding:28px}
  #dock,#tabbar{max-width:640px;width:100%;margin:0 auto;border-left:1px solid var(--line);border-right:1px solid var(--line)}
  #toast{bottom:130px}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo"><b>🥔 포카칩</b><span>PokaChip</span></div>
    <button class="hbtn" id="shareBtn" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v7a1 1 0 001 1h14a1 1 0 001-1v-7M16 6l-4-4-4 4M12 2v13"/></svg>공유
    </button>
    <button class="hbtn primary" id="saveBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>저장
    </button>
  </header>

  <div id="main">
    <div id="previewArea">
      <div id="selBar">
        <button id="editSelBtn">✏️ 편집</button>
        <button id="resetSelBtn">↺ 초기화</button>
        <button id="delSelBtn" class="danger">삭제</button>
      </div>
      <div id="stageWrap">
        <div id="stage">
          <div id="bgLayer"></div>
          <div id="bgDim"></div>
          <div id="photoCard" style="display:none"><img id="photoImg" alt="" draggable="false"></div>
          <div id="textLayer"></div>
          <div class="guide-v" id="guideV"></div>
          <div class="guide-h" id="guideH"></div>
          <div id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5-8 8"/></svg>
            <p>탭해서 사진 선택</p>
            <small>JPG · PNG · WEBP · RAW/DNG (드래그 앤 드롭 가능)</small>
          </div>
        </div>
      </div>
    </div>

    <div id="dock">
      <div id="dockSlider" class="dock-slider" hidden>
        <span id="dsLabel"></span>
        <input type="range" id="dsRange">
        <span id="dsVal"></span>
      </div>
      <div id="dockAlt" class="dock-row alt" hidden></div>
      <div id="dockRow" class="dock-row"></div>
    </div>

    <nav id="tabbar">
      <button data-tab="photo" class="on">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5-8 8"/></svg>사진
      </button>
      <button data-tab="meta">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>정보
      </button>
      <button data-tab="layout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="10" rx="2"/><path d="M6 18h12M8 21h8"/></svg>배치
      </button>
      <button data-tab="text">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7V5h16v2M12 5v14M9 19h6"/></svg>텍스트
      </button>
      <button data-tab="bg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 000 18z" fill="currentColor" stroke="none"/></svg>배경
      </button>
    </nav>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*,.dng,.DNG,.tif,.tiff,.nef,.cr2,.cr3,.arw,.raf,.rw2,.orf" hidden>
<div id="toast"></div>

<script>
'use strict';
/* =====================================================
   포카칩 PokaChip — 인스타그램 스토리 이미지 메이커
   캔버스 좌표계: 1080 × 1920 (스테이지는 transform: scale 로 축소 표시)
===================================================== */
const CW = 1080, CH = 1920;
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

const FONTS = [
  {key:'noto',   family:'Noto Sans KR',    label:'노토 산스'},
  {key:'myeongjo',family:'Nanum Myeongjo', label:'나눔명조'},
  {key:'gowun',  family:'Gowun Dodum',     label:'고운돋움'},
  {key:'pen',    family:'Nanum Pen Script',label:'나눔손글씨'},
  {key:'black',  family:'Black Han Sans',  label:'블랙한산스'},
  {key:'mono',   family:'IBM Plex Mono',   label:'모노(영문)'},
];
const fontFamily = key => (FONTS.find(f=>f.key===key)||FONTS[0]).family;

const BG_COLORS = ['#000000','#ffffff','#f5ede3','#ece5da','#e8d5c4','#d9c8b4','#c9d8c5','#a3b8a0','#f2d7d5','#d5a6bd','#a9cce3','#5d6d7e','#2c3e50','#1a1a2e','#5c4033','#8b0000'];
const TEXT_COLORS = ['#ffffff','#111111','#ffd54a','#ff6b6b','#74c0fc','#8ce99a','#f5ede3','#d5a6bd'];

/* ---------- 상태 ---------- */
const state = {
  // 사진은 비율이 정해진 카드로 항상 중앙 배치. ox/oy·zoom은 카드 안 구도(크롭)
  photo: { img:null, ratio:'3:4', width:0.85, zoom:1, ox:0, oy:0, radius:28 },
  bg:    { mode:'blur', color:'#f5ede3', blur:48, dim:0.22, c1:'#3a3a52', c2:'#1a1a24' },
  texts: [],   // {id, kind:'user'|'meta', metaKey, text, x, y, size, font, weight, color, pill, align, edited, moved}
  meta:  {},   // 파싱된 EXIF
  metaOpts: {
    show:{ datetime:true, location:true, camera:true, detail:false },
    dateFormat:'dot', showTime:true, preset:'below',
    font:'myeongjo', sizeMul:1, color:'#ffffff',
  },
  export:{ scale:1, fmt:'jpg' },
  selected:null,
  fileName:'photo',
};
let idSeq = 1;

/* ---------- 기본값 (localStorage) ---------- */
const LS_KEY = 'pokachip-defaults-v1';
function saveDefaults(){
  const d = { metaOpts: state.metaOpts,
    bg: {mode:state.bg.mode, color:state.bg.color, blur:state.bg.blur, dim:state.bg.dim},
    photo:{radius:state.photo.radius, ratio:state.photo.ratio, width:state.photo.width} };
  localStorage.setItem(LS_KEY, JSON.stringify(d));
  toast('기본값으로 저장했어요 ⭐');
}
function loadDefaults(){
  try{
    const d = JSON.parse(localStorage.getItem(LS_KEY));
    if(!d) return;
    Object.assign(state.metaOpts, d.metaOpts||{});
    if(d.metaOpts?.show) Object.assign(state.metaOpts.show, d.metaOpts.show);
    Object.assign(state.bg, d.bg||{});
    if(d.photo?.radius!=null) state.photo.radius = d.photo.radius;
    if(d.photo?.ratio) state.photo.ratio = d.photo.ratio;
    if(d.photo?.width) state.photo.width = d.photo.width;
  }catch(e){}
  // 구버전에 저장된 배치 프리셋 호환
  if(!['below','above','split'].includes(state.metaOpts.preset)) state.metaOpts.preset = 'below';
}

/* ---------- 토스트 ---------- */
let toastTimer;
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* =====================================================
   EXIF 파서 (JPEG APP1 + 범용 'Exif\0\0' 스캔 폴백)
===================================================== */
function parseExif(buffer){
  const view = new DataView(buffer);
  let tiff = -1;
  // JPEG 마커 순회
  if(view.byteLength > 4 && view.getUint16(0) === 0xFFD8){
    let off = 2;
    while(off + 4 < view.byteLength){
      const marker = view.getUint16(off);
      if((marker & 0xFF00) !== 0xFF00) break;
      const size = view.getUint16(off+2);
      if(marker === 0xFFE1 && off+10 < view.byteLength && view.getUint32(off+4) === 0x45786966){ tiff = off+10; break; }
      if(marker === 0xFFDA) break;
      off += 2 + size;
    }
  }
  // 베어 TIFF (DNG/NEF/CR2/ARW 등 RAW 파일은 TIFF 구조로 시작)
  if(tiff < 0 && view.byteLength > 8){
    const bo0 = view.getUint16(0);
    if((bo0 === 0x4949 || bo0 === 0x4D4D) && view.getUint16(2, bo0 === 0x4949) === 42) tiff = 0;
  }
  // 폴백: 버퍼 앞부분에서 'Exif\0\0' 패턴 스캔 (HEIC/PNG 등)
  if(tiff < 0){
    const limit = Math.min(view.byteLength - 10, 512*1024);
    for(let i=0;i<limit;i++){
      if(view.getUint32(i) === 0x45786966 && view.getUint16(i+4) === 0){
        const cand = i+6;
        const bo = view.getUint16(cand);
        if(bo === 0x4949 || bo === 0x4D4D){ tiff = cand; break; }
      }
    }
  }
  if(tiff < 0) return null;

  const bo = view.getUint16(tiff);
  const le = bo === 0x4949;
  if(view.getUint16(tiff+2, le) !== 42) return null;

  function readTag(entry){
    const type = view.getUint16(entry+2, le);
    const count = view.getUint32(entry+4, le);
    const SZ = {1:1,2:1,3:2,4:4,5:8,7:1,9:4,10:8};
    const total = (SZ[type]||1) * count;
    const valOff = total <= 4 ? entry+8 : tiff + view.getUint32(entry+8, le);
    if(valOff + total > view.byteLength) return null;
    try{
      if(type === 2){ // ASCII
        let s=''; for(let i=0;i<count;i++){ const c=view.getUint8(valOff+i); if(c===0)break; s+=String.fromCharCode(c); }
        return s.trim();
      }
      if(type === 3) return count===1 ? view.getUint16(valOff,le) : Array.from({length:count},(_,i)=>view.getUint16(valOff+i*2,le));
      if(type === 4) return count===1 ? view.getUint32(valOff,le) : Array.from({length:count},(_,i)=>view.getUint32(valOff+i*4,le));
      if(type === 5 || type === 10){
        const rat = i => {
          const n = type===5 ? view.getUint32(valOff+i*8,le) : view.getInt32(valOff+i*8,le);
          const d = type===5 ? view.getUint32(valOff+i*8+4,le) : view.getInt32(valOff+i*8+4,le);
          return d ? n/d : 0;
        };
        return count===1 ? rat(0) : Array.from({length:count},(_,i)=>rat(i));
      }
    }catch(e){ return null; }
    return null;
  }
  function readIFD(ifdOff, tags, out){
    if(ifdOff+2 > view.byteLength) return;
    const n = view.getUint16(ifdOff, le);
    for(let i=0;i<n;i++){
      const entry = ifdOff + 2 + i*12;
      if(entry+12 > view.byteLength) return;
      const tag = view.getUint16(entry, le);
      if(tags[tag]) out[tags[tag]] = readTag(entry);
    }
  }

  const r = {};
  readIFD(tiff + view.getUint32(tiff+4, le), {0x010F:'make',0x0110:'model',0x0132:'dateTime',0x8769:'exifPtr',0x8825:'gpsPtr'}, r);
  if(r.exifPtr) readIFD(tiff + r.exifPtr, {
    0x9003:'dateTimeOriginal',0x829A:'exposureTime',0x829D:'fNumber',
    0x8827:'iso',0x920A:'focalLength',0xA405:'focal35',0xA434:'lensModel'
  }, r);
  if(r.gpsPtr) readIFD(tiff + r.gpsPtr, {0x0001:'latRef',0x0002:'lat',0x0003:'lonRef',0x0004:'lon'}, r);

  const out = {};
  const dateStr = r.dateTimeOriginal || r.dateTime;
  if(dateStr){
    const m = String(dateStr).match(/(\d{4}):(\d{2}):(\d{2})\s+(\d{2}):(\d{2})/);
    if(m) out.date = new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5]);
  }
  if(r.model){
    let cam = String(r.model);
    if(r.make && !cam.toLowerCase().includes(String(r.make).split(' ')[0].toLowerCase()))
      cam = r.make + ' ' + cam;
    out.camera = cam;
  }
  if(r.lensModel) out.lens = String(r.lensModel);
  if(Array.isArray(r.lat) && Array.isArray(r.lon) && r.lat.length>=1 && r.lon.length>=1){
    const dms = a => (a[0]||0) + (a[1]||0)/60 + (a[2]||0)/3600;
    let lat = dms(r.lat), lon = dms(r.lon);
    if(r.latRef === 'S') lat = -lat;
    if(r.lonRef === 'W') lon = -lon;
    if(lat || lon){ out.lat = lat; out.lon = lon; }
  }
  const detail = [];
  if(r.fNumber) detail.push('f/' + (Math.round(r.fNumber*10)/10));
  if(r.exposureTime){
    detail.push(r.exposureTime >= 1 ? Math.round(r.exposureTime)+'s' : '1/'+Math.round(1/r.exposureTime)+'s');
  }
  if(r.iso) detail.push('ISO ' + (Array.isArray(r.iso)?r.iso[0]:r.iso));
  if(r.focalLength) detail.push(Math.round(r.focalLength)+'mm');
  if(detail.length) out.detail = detail.join(' · ');
  return out;
}

/* =====================================================
   RAW/DNG 미리보기 추출
   DNG(아이폰 ProRAW · 갤럭시 Expert RAW)와 TIFF 계열 RAW는
   내부에 JPEG 미리보기를 품고 있어 그중 가장 큰 것을 꺼내 쓴다.
===================================================== */
function tryDecodeBlob(blob){
  return new Promise(res=>{
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = ()=>res(img);
    img.onerror = ()=>{ URL.revokeObjectURL(url); res(null); };
    img.src = url;
  });
}

// EXIF Orientation(2~8) 적용해 바로 선 이미지로 변환
async function orientImage(img, o){
  if(!o || o === 1) return img;
  const w = img.naturalWidth, h = img.naturalHeight;
  const c = document.createElement('canvas');
  const swap = o >= 5;
  c.width = swap ? h : w; c.height = swap ? w : h;
  const x = c.getContext('2d');
  switch(o){
    case 2: x.transform(-1,0,0,1,w,0); break;
    case 3: x.transform(-1,0,0,-1,w,h); break;
    case 4: x.transform(1,0,0,-1,0,h); break;
    case 5: x.transform(0,1,1,0,0,0); break;
    case 6: x.transform(0,1,-1,0,h,0); break;
    case 7: x.transform(0,-1,-1,0,h,w); break;
    case 8: x.transform(0,-1,1,0,0,w); break;
  }
  x.drawImage(img, 0, 0);
  const blob = await new Promise(ok=>c.toBlob(ok, 'image/jpeg', 0.97));
  return (await tryDecodeBlob(blob)) || img;
}

// 최후 폴백: 버퍼에서 JPEG 시그니처(FFD8FF)를 스캔해 디코딩 시도
async function bruteScanJpeg(buffer, ori){
  const u8 = new Uint8Array(buffer);
  const starts = [];
  for(let i=0, n=u8.length-3; i<n && starts.length<12; i++){
    if(u8[i]===0xFF && u8[i+1]===0xD8 && u8[i+2]===0xFF &&
       (u8[i+3]===0xE0 || u8[i+3]===0xE1 || u8[i+3]===0xDB)) starts.push(i);
  }
  let best = null;
  for(const s of starts){
    const img = await tryDecodeBlob(new Blob([buffer.slice(s)], {type:'image/jpeg'}));
    if(img && (!best || img.naturalWidth > best.naturalWidth)) best = img;
    if(best && best.naturalWidth >= 2000) break;
  }
  return best ? orientImage(best, ori || 1) : null;
}

async function extractRawPreview(buffer){
  const view = new DataView(buffer);
  if(view.byteLength < 16) return null;
  const bo = view.getUint16(0);
  if(bo !== 0x4949 && bo !== 0x4D4D) return bruteScanJpeg(buffer);
  const le = bo === 0x4949;
  if(view.getUint16(2, le) !== 42) return bruteScanJpeg(buffer);

  const SZ = {1:1,2:1,3:2,4:4,5:8,7:1,9:4,10:8};
  function readTag(entry){
    const type = view.getUint16(entry+2, le);
    const count = view.getUint32(entry+4, le);
    const total = (SZ[type]||1) * count;
    const off = total <= 4 ? entry+8 : view.getUint32(entry+8, le);
    if(off + total > view.byteLength) return null;
    if(type !== 3 && type !== 4) return null;
    const get = i => type === 3 ? view.getUint16(off+i*2, le) : view.getUint32(off+i*4, le);
    return count === 1 ? get(0) : Array.from({length:count}, (_,i)=>get(i));
  }

  const cands = [];
  let baseOri = 1;
  const visited = new Set();
  function walk(ifd, depth){
    if(depth > 6 || ifd <= 0 || ifd+2 > view.byteLength || visited.has(ifd)) return;
    visited.add(ifd);
    const n = view.getUint16(ifd, le);
    if(n > 512) return;
    const t = {};
    for(let i=0;i<n;i++){
      const e = ifd + 2 + i*12;
      if(e+12 > view.byteLength) return;
      t[view.getUint16(e, le)] = e;
    }
    const v = tag => t[tag]!=null ? readTag(t[tag]) : null;
    const first = x => Array.isArray(x) ? x[0] : x;
    const sum = x => Array.isArray(x) ? x.reduce((a,b)=>a+b,0) : x;

    if(visited.size === 1 && t[0x0112]) baseOri = first(v(0x0112)) || 1;
    const comp = first(v(0x0103)), photo = first(v(0x0106)), w = first(v(0x0100)) || 0;
    const jif = first(v(0x0201)), jifLen = first(v(0x0202));
    const so = first(v(0x0111)), sc = sum(v(0x0117));
    const ori = first(v(0x0112));
    if(jif && jifLen) cands.push({off:jif, len:jifLen, w, ori});
    else if((comp === 6 || comp === 7) && photo !== 32803 && photo !== 34892 && so && sc)
      cands.push({off:so, len:sc, w, ori}); // 32803(CFA)·34892(LinearRaw)는 원시 데이터라 제외

    const sub = v(0x014A);
    if(sub) (Array.isArray(sub)?sub:[sub]).forEach(o=>walk(o, depth+1));
    const nextPtr = ifd + 2 + n*12;
    if(nextPtr + 4 <= view.byteLength) walk(view.getUint32(nextPtr, le), depth);
  }
  try{ walk(view.getUint32(4, le), 0); }catch(e){}

  cands.sort((a,b)=>(b.w - a.w) || (b.len - a.len));
  for(const c of cands){
    if(c.off+2 > view.byteLength || view.getUint16(c.off) !== 0xFFD8) continue;
    const end = Math.min(c.off + (c.len || view.byteLength), view.byteLength);
    const img = await tryDecodeBlob(new Blob([buffer.slice(c.off, end)], {type:'image/jpeg'}));
    if(img && img.naturalWidth > 160) return orientImage(img, c.ori || baseOri);
  }
  return bruteScanJpeg(buffer, baseOri);
}

/* ---------- 역지오코딩 (OpenStreetMap Nominatim) ---------- */
async function reverseGeocode(lat, lon){
  const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=jsonv2&accept-language=ko&zoom=16`;
  const res = await fetch(url, {headers:{'Accept':'application/json'}});
  if(!res.ok) throw new Error('geocode fail');
  const j = await res.json();
  const a = j.address || {};
  const big = a.city || a.province || a.state || a.county || '';
  const mid = a.borough || a.city_district || a.district || a.town || '';
  const small = a.suburb || a.neighbourhood || a.quarter || a.village || a.hamlet || '';
  const parts = [big, mid, small].filter(Boolean);
  // "서울특별시" → "서울" 식으로 축약
  const shorten = s => s.replace(/(특별시|광역시|특별자치시|특별자치도)$/,'');
  let name = parts.map(shorten).slice(0,3).join(' ');
  if(!name) name = (j.display_name||'').split(',').slice(0,2).join(' ').trim();
  return name || null;
}

/* ---------- 날짜 포맷 ---------- */
function fmtDatetime(d){
  if(!d) return '';
  const o = state.metaOpts;
  const p2 = n => String(n).padStart(2,'0');
  const wd = ['sun','mon','tue','wed','thu','fri','sat'][d.getDay()];
  const wdKo = ['일','월','화','수','목','금','토'][d.getDay()];
  let ds;
  switch(o.dateFormat){
    case 'kor':  ds = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${wdKo})`; break;
    case 'eng':  ds = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][d.getMonth()] + ` ${d.getDate()}, ${d.getFullYear()} (${wd.toUpperCase()})`; break;
    case 'short':ds = `${String(d.getFullYear()).slice(2)}. ${d.getMonth()+1}. ${d.getDate()} (${wd})`; break;
    default:     ds = `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()} (${wd})`;
  }
  if(!o.showTime) return ds;
  let ts;
  if(o.dateFormat === 'kor'){
    const h = d.getHours(); const ap = h < 12 ? '오전' : '오후';
    ts = `${ap} ${((h+11)%12)+1}:${p2(d.getMinutes())}`;
  } else if(o.dateFormat === 'eng'){
    const h = d.getHours(); const ap = h < 12 ? 'AM' : 'PM';
    ts = `${((h+11)%12)+1}:${p2(d.getMinutes())} ${ap}`;
  } else {
    ts = `${p2(d.getHours())}:${p2(d.getMinutes())}`;
  }
  return ds + ' ' + ts;
}

/* ---------- 스택 레이아웃 계산 ----------
   사진 카드와 모든 텍스트(메타 + 사용자)를 겹침 없이 한 줄씩 세로로 쌓고,
   전체 그룹을 캔버스 세로 중앙에 정렬한다. 각 요소의 ord 값이 줄 순서.
   (사진 ord=0 고정, 날짜+위치는 ord가 같으면 한 줄에 나란히)          */
const ROW_GAP = 22, PHOTO_GAP = 46, PAIR_GAP = 70;
const measureCtx = document.createElement('canvas').getContext('2d');
function textWidth(t){
  measureCtx.font = `${t.weight||400} ${t.size}px "${fontFamily(t.font)}", sans-serif`;
  return Math.max(...t.text.split('\n').map(l=>measureCtx.measureText(l).width));
}
const elH = t => t.size * 1.35 * t.text.split('\n').length;
function ratioVal(){
  const p = state.photo;
  if(p.ratio === 'orig') return p.img ? p.img.naturalWidth/p.img.naturalHeight : 3/4;
  const [a,b] = p.ratio.split(':').map(Number);
  return a/b;
}
function stackRows(){
  const rows = [];
  if(state.photo.img){
    rows.push({type:'photo', ord:0});
    const vis = k => state.texts.find(t=>t.kind==='meta' && t.metaKey===k && !t.hidden);
    const dt = vis('datetime'), loc = vis('location');
    if(dt && loc && dt.ord === loc.ord) rows.push({items:[dt,loc], ord:dt.ord});
    else { if(dt) rows.push({items:[dt], ord:dt.ord}); if(loc) rows.push({items:[loc], ord:loc.ord}); }
    for(const k of ['camera','detail']){ const t = vis(k); if(t) rows.push({items:[t], ord:t.ord}); }
  }
  for(const t of state.texts) if(t.kind==='user' && !t.hidden) rows.push({items:[t], ord:t.ord ?? 99});
  rows.sort((a,b)=>(a.ord??0)-(b.ord??0));
  return rows;
}
function computeLayout(){
  const p = state.photo;
  const cw = Math.round(CW * p.width);
  const ch = Math.round(cw / ratioVal());
  const rows = stackRows();
  const rowH = r => r.type==='photo' ? ch : Math.max(...r.items.map(elH));
  const gapAfter = (a,b) => (a.type==='photo' || b.type==='photo') ? PHOTO_GAP : ROW_GAP;
  let total = 0;
  rows.forEach((r,i)=>{ total += rowH(r); if(i < rows.length-1) total += gapAfter(r, rows[i+1]); });
  let y = Math.max(40, (CH - total)/2);
  let card = null;
  const linePos = [];
  rows.forEach((r,i)=>{
    const h = rowH(r);
    if(r.type==='photo') card = { left:(CW-cw)/2, top:y, w:cw, h:ch };
    else linePos.push({ items:r.items, cy:y+h/2 });
    y += h;
    if(i < rows.length-1) y += gapAfter(r, rows[i+1]);
  });
  if(!card) card = { left:(CW-cw)/2, top:(CH-ch)/2, w:cw, h:ch };
  return { card, linePos };
}

function renderPhoto(){
  const p = state.photo, cardEl = $('#photoCard');
  if(!p.img){ cardEl.style.display='none'; return; }
  const { card:r } = computeLayout();
  if(photoEl.getAttribute('src') !== p.img.src) photoEl.src = p.img.src;
  cardEl.style.display = 'block';
  cardEl.style.left = r.left+'px'; cardEl.style.top = r.top+'px';
  cardEl.style.width = r.w+'px'; cardEl.style.height = r.h+'px';
  cardEl.style.borderRadius = p.radius+'px';
  const bs = Math.max(r.w/p.img.naturalWidth, r.h/p.img.naturalHeight) * p.zoom;
  const dw = p.img.naturalWidth*bs, dh = p.img.naturalHeight*bs;
  // 카드 밖 여백이 생기지 않도록 구도 이동 범위 제한
  const mx = Math.max(0,(dw-r.w)/2), my = Math.max(0,(dh-r.h)/2);
  p.ox = Math.min(mx, Math.max(-mx, p.ox));
  p.oy = Math.min(my, Math.max(-my, p.oy));
  photoEl.style.width = dw+'px'; photoEl.style.height = dh+'px';
  photoEl.style.left = (r.w-dw)/2 + p.ox + 'px';
  photoEl.style.top = (r.h-dh)/2 + p.oy + 'px';
  refreshDockSlider();
}

function renderBg(){
  const b = state.bg;
  bgLayer.innerHTML = '';
  bgLayer.style.background = '';
  bgDim.style.opacity = 0;
  if(b.mode === 'color'){
    bgLayer.style.background = b.color;

    bgLayer.style.background = `linear-gradient(180deg, ${b.c1}, ${b.c2})`;
  } else { // blur

      bgLayer.appendChild(im);
      bgDim.style.opacity = b.dim;
    } else {
      bgLayer.style.background = '#1a1a20';
    }
  }
}

function renderTexts(){
  textLayer.innerHTML = '';
  for(const t of state.texts){
    if(t.hidden) continue;
    const el = document.createElement('div');
    el.className = 'text-el' + (state.selected===t.id?' selected':'');
    el.dataset.id = t.id;
    el.textContent = t.text;
    el.style.fontFamily = `'${fontFamily(t.font)}', sans-serif`;
    el.style.fontSize = t.size+'px';
    el.style.fontWeight = t.weight || 400;
    el.style.color = t.color;
    el.style.textAlign = t.align;
    el.style.left = t.x+'px'; el.style.top = t.y+'px';
    el.style.transform = t.align==='left' ? 'translate(0,-50%)' : 'translate(-50%,-50%)';
    if(t.pill && t.pill!=='none'){
      el.style.background = t.pill==='dark' ? 'rgba(0,0,0,.55)' : 'rgba(255,255,255,.92)';
      el.style.padding = `${t.size*0.25}px ${t.size*0.45}px`;
      el.style.borderRadius = t.size*0.35+'px';
      el.style.textShadow = 'none';
    } else {
      el.style.textShadow = '0 2px 12px rgba(0,0,0,.35)';
    }
    textLayer.appendChild(el);
  }
  $('#selBar').classList.toggle('show', !!state.selected);
  $('#emptyState').style.display = state.photo.img ? 'none' : 'flex';
}

/* =====================================================
   메타 텍스트 요소 관리
===================================================== */
const META_STYLE = { datetime:{size:40,weight:500}, location:{size:40,weight:400}, camera:{size:32,weight:400}, detail:{size:26,weight:400} };
// 배치 프리셋 → 줄 순서 (사진 ord=0 기준, 음수는 사진 위)
const PRESET_ORDS = {
  below: {datetime:1,  location:1,  camera:2,  detail:3},
  above: {datetime:-3, location:-3, camera:-2, detail:-1},
  split: {datetime:-1, location:-1, camera:1,  detail:2},
};
function presetOrd(key){ return (PRESET_ORDS[state.metaOpts.preset] || PRESET_ORDS.below)[key]; }
function applyPresetOrds(){
  state.texts.filter(t=>t.kind==='meta').forEach(t=>{ t.ord = presetOrd(t.metaKey); });
}

function metaText(key){
  const m = state.meta;
  if(key==='datetime') return fmtDatetime(m.date);
  if(key==='location') return m.locationName || (m.lat!=null ? `${m.lat.toFixed(4)}, ${m.lon.toFixed(4)}` : '');
  if(key==='camera')   return m.camera || '';
  if(key==='detail')   return m.detail || '';
  return '';
}

function syncMetaTexts(relayout){
  const o = state.metaOpts;
  for(const key of ['datetime','location','camera','detail']){
    let t = state.texts.find(x=>x.kind==='meta' && x.metaKey===key);
    const content = metaText(key);
    const want = o.show[key] && content;
    if(want){
      if(!t){
        t = { id:'m'+(idSeq++), kind:'meta', metaKey:key, text:content, x:CW/2, y:CH/2,
              ord: presetOrd(key), size:META_STYLE[key].size*o.sizeMul, font:o.font,
              weight:META_STYLE[key].weight, color:o.color, pill:'none', align:'center', edited:false };
        state.texts.push(t);
        relayout = true;
      }
      if(!t.edited) t.text = content;
      if(!t.userStyled){ t.font = o.font; t.color = o.color; t.size = META_STYLE[key].size*o.sizeMul; }
      t.hidden = false;
    } else if(t){
      t.hidden = true;
      if(state.selected===t.id) state.selected=null;
    }
  }
  layoutMeta();
  renderPhoto();
  renderTexts();
  renderMetaList();
}

// 스택의 모든 텍스트 줄 좌표를 계산해 적용
function layoutMeta(){
  const { card, linePos } = computeLayout();
  for(const {items, cy} of linePos){
    if(items.length === 1){
      const t = items[0];
      t.y = cy;
      t.x = t.align === 'left' ? card.left : CW/2; // 왼쪽 정렬은 카드 왼쪽 모서리에 맞춤
    } else {
      // 날짜 + 위치를 한 줄에 나란히, 줄 전체를 가운데 정렬
      const ws = items.map(textWidth);
      const total = ws.reduce((a,b)=>a+b,0) + PAIR_GAP*(items.length-1);
      let x = CW/2 - total/2;
      items.forEach((t,i)=>{ t.x = x + ws[i]/2; t.y = cy; t.align = 'center'; x += ws[i] + PAIR_GAP; });
    }
  }
}

// 드래그로 놓은 위치(y)에 맞춰 줄 순서를 바꾼다
function reorderText(t, y){
  const { card, linePos } = computeLayout();
  const entries = [{ord:0, cy: card.top + card.h/2}];
  for(const lp of linePos)
    if(!lp.items.includes(t)) entries.push({ord: lp.items[0].ord ?? 0, cy: lp.cy});
  entries.sort((a,b)=>a.cy-b.cy);
  let prev = null, next = null;
  for(const e of entries){ if(e.cy <= y) prev = e; else { next = e; break; } }
  t.ord = prev && next ? (prev.ord + next.ord)/2 : prev ? prev.ord + 1 : next ? next.ord - 1 : 1;
  layoutMeta(); renderPhoto(); renderTexts();
}

function renderMetaList(){ renderDock(); }

/* =====================================================
   파일 로드
===================================================== */
const RAW_EXT = /\.(dng|tiff?|nef|cr2|cr3|arw|raf|rw2|orf)$/i;
async function loadFile(file){
  if(!file) return;
  const isRaw = RAW_EXT.test(file.name);
  if(!file.type.startsWith('image/') && !isRaw){ toast('이미지 파일을 선택해 주세요'); return; }
  state.fileName = file.name.replace(/\.[^.]+$/,'');
  if(isRaw) toast('RAW 파일에서 미리보기 추출 중…');
  const buffer = await file.arrayBuffer();

  let img = null, fromRaw = false;
  if(!isRaw) img = await tryDecodeBlob(new Blob([buffer], {type:file.type}));
  if(!img){
    img = await extractRawPreview(buffer);
    fromRaw = !!img;
  }
  if(!img || !img.naturalWidth){
    toast(isRaw ? '이 RAW 파일에서 미리보기를 찾지 못했어요 — JPG로 변환해 주세요'
                : '이 이미지를 열 수 없어요 (HEIC라면 JPG로 변환해 주세요)');
    return;
  }

  state.photo.img = img;
  state.photo.original = img; state.photo.rot = 0;
  state.photo.zoom = 1; state.photo.ox = 0; state.photo.oy = 0;

  // EXIF (RAW도 TIFF 구조에서 그대로 읽힌다)
  const exif = parseExif(buffer) || {};
  if(!exif.date && file.lastModified) exif.date = new Date(file.lastModified);
  state.meta = exif;
  state.texts.filter(t=>t.kind==='meta').forEach(t=>{ t.edited=false; });
  applyPresetOrds();

  renderAll();
  syncMetaTexts(true);
  if(fromRaw) toast(`RAW 미리보기를 불러왔어요 (${img.naturalWidth}×${img.naturalHeight}) 📸`);
  else toast(exif.camera || exif.lat!=null ? '사진 정보를 불러왔어요 📸' : '사진에 저장된 메타데이터가 적어요 — 직접 입력할 수 있어요');

  if(exif.lat!=null){
    state.meta.locPending = true;
    renderMetaList();
    reverseGeocode(exif.lat, exif.lon)
      .then(name=>{ if(name){ state.meta.locationName = name; } })
      .catch(()=>{})
      .finally(()=>{ state.meta.locPending = false; syncMetaTexts(false); });
  }
}

const pointers = new Map();
let drag = null; // {type:'photo'|'text', id, startX, startY, origX, origY} | {type:'pinch', ...}
let lastTap = {t:0, id:null};

function stagePoint(e){

}
function findText(id){ return state.texts.find(t=>t.id===id); }

stage.addEventListener('pointerdown', e=>{
  const editingEl = textLayer.querySelector('.editing');
  if(editingEl){
    if(editingEl.contains(e.target)) return; // 편집 중엔 통과
    finishEdit(editingEl);
  }
  stage.setPointerCapture(e.pointerId);
  const p = stagePoint(e);
  pointers.set(e.pointerId, p);

  if(pointers.size === 2 && state.photo.img){
    // 핀치 시작 (카드 안 확대)
    const [a,b] = [...pointers.values()];
    drag = { type:'pinch', startDist:Math.hypot(a.x-b.x,a.y-b.y), startScale:state.photo.zoom };
    return;
  }
  const textEl = e.target.closest('.text-el');
  if(textEl){
    const t = findText(textEl.dataset.id);
    state.selected = t.id;
    syncTextPanel(t);
    drag = { type:'text', id:t.id, sx:p.x, sy:p.y, ox:t.x, oy:t.y, movedNow:false };
    renderTexts();
  } else if(state.photo.img){
    state.selected = null; renderTexts();
    drag = { type:'photo', sx:p.x, sy:p.y, ox:state.photo.ox, oy:state.photo.oy };
    stage.classList.add('dragging');
  } else {
    state.selected = null; renderTexts();
  }
});

stage.addEventListener('pointermove', e=>{
  if(!pointers.has(e.pointerId)) return;
  const p = stagePoint(e);
  pointers.set(e.pointerId, p);
  if(!drag) return;

  if(drag.type === 'pinch' && pointers.size >= 2){
    const [a,b] = [...pointers.values()];
    const dist = Math.hypot(a.x-b.x, a.y-b.y);
    state.photo.zoom = Math.min(4, Math.max(1, drag.startScale * dist / drag.startDist));
    renderPhoto();
    return;
  }
  if(drag.type === 'photo'){
    state.photo.ox = drag.ox + (p.x - drag.sx);
    state.photo.oy = drag.oy + (p.y - drag.sy);
    renderPhoto();
  }
  if(drag.type === 'text'){
    const t = findText(drag.id); if(!t) return;
    // 드래그 중엔 손가락을 따라가고, 놓으면 스택의 줄 순서로 스냅된다
    const nx = drag.ox + (p.x - drag.sx);
    const ny = drag.oy + (p.y - drag.sy);
    if(Math.abs(p.x-drag.sx)>3||Math.abs(p.y-drag.sy)>3) drag.movedNow = true;
    t.x = nx; t.y = ny;
    const el = textLayer.querySelector(`[data-id="${t.id}"]`);
    if(el){ el.style.left = nx+'px'; el.style.top = ny+'px'; }
  }
});

function endPointer(e){
  pointers.delete(e.pointerId);
  $('#guideV').style.display='none'; $('#guideH').style.display='none';
  stage.classList.remove('dragging');
  if(drag && drag.type==='text'){
    if(drag.movedNow){
      // 놓은 위치에 맞춰 줄 순서 변경 후 스택으로 스냅
      const t = findText(drag.id);
      if(t) reorderText(t, stagePoint(e).y);
    } else {
      // 탭 → 더블탭 감지
      const now = Date.now();
      if(lastTap.id === drag.id && now - lastTap.t < 350){
        startEdit(drag.id);
        lastTap = {t:0,id:null};
      } else {
        lastTap = {t:now, id:drag.id};
      }
    }
  }
  if(pointers.size === 0) drag = null;
  else if(drag && drag.type==='pinch' && pointers.size < 2) drag = null;
}
stage.addEventListener('pointerup', endPointer);
stage.addEventListener('pointercancel', endPointer);

// 마우스 휠 줌
$('#previewArea').addEventListener('wheel', e=>{
  if(!state.photo.img) return;
  e.preventDefault();
  const f = Math.exp(-e.deltaY * 0.0015);
  state.photo.zoom = Math.min(4, Math.max(1, state.photo.zoom * f));
  renderPhoto();
}, {passive:false});

/* ---------- 인라인 편집 ---------- */
function startEdit(id){
  const t = findText(id); if(!t) return;
  const el = textLayer.querySelector(`[data-id="${id}"]`); if(!el) return;
  el.classList.add('editing');
  el.contentEditable = 'plaintext-only';
  try{ el.focus(); }catch(e){}
  // contentEditable=plaintext-only 미지원 브라우저 폴백
  if(el.contentEditable !== 'plaintext-only'){ el.contentEditable = 'true'; el.focus(); }
  const sel = getSelection(); const range = document.createRange();
  range.selectNodeContents(el); sel.removeAllRanges(); sel.addRange(range);
  el.addEventListener('blur', ()=>finishEdit(el), {once:true});
}
function finishEdit(el){
  const t = findText(el.dataset.id);
  el.contentEditable = 'false'; el.classList.remove('editing');
  if(!t) return;
  const txt = el.innerText.replace(/\n{3,}/g,'\n\n').trim();
  if(txt){
    if(txt !== t.text){ t.text = txt; if(t.kind==='meta') t.edited = true; }
  } else if(t.kind==='user'){
    state.texts = state.texts.filter(x=>x.id!==t.id);
    if(state.selected===t.id) state.selected=null;
  } else { t.text = metaText(t.metaKey); }
  layoutMeta(); renderPhoto(); renderTexts(); syncTextPanel(findText(state.selected));
}

/* ---------- 선택 툴바 ---------- */
$('#editSelBtn').onclick = ()=>{ if(state.selected) startEdit(state.selected); };
$('#delSelBtn').onclick = ()=>{
  const t = findText(state.selected); if(!t) return;
  if(t.kind==='meta'){ state.metaOpts.show[t.metaKey] = false; syncMetaTexts(false); }
  else { state.texts = state.texts.filter(x=>x.id!==t.id); layoutMeta(); renderPhoto(); }
  state.selected = null; renderTexts(); renderMetaList();
};
$('#resetSelBtn').onclick = ()=>{
  const t = findText(state.selected); if(!t) return;
  if(t.kind==='meta'){ t.edited=false; t.userStyled=false; t.ord=presetOrd(t.metaKey); syncMetaTexts(true); }
  else { layoutMeta(); renderPhoto(); renderTexts(); }
};

/* =====================================================
   하단 도크 UI (Lightroom / Instagram 모바일 스타일)
   1행: 탭별 가로 스크롤 칩 · 2행: 선택한 파라미터의 슬라이더 또는 보조 칩
===================================================== */
let activeTab = 'photo';
let dockParam = null;   // 열려 있는 슬라이더 키
let dockAltKey = null;  // 열려 있는 보조 행 (폰트/색상)
const textStyle = { font:'noto', size:52, color:'#ffffff', pill:'none', align:'center' };

function relayoutAll(){ layoutMeta(); renderPhoto(); renderTexts(); }
function selText(){ return findText(state.selected); }
function applyToSelected(fn){ const t = selText(); if(!t) return; fn(t); relayoutAll(); }

const SLIDERS = {
  width:   {label:'너비',   min:50,  max:100, get:()=>Math.round(state.photo.width*100), set:v=>{state.photo.width=v/100; relayoutAll();}, fmt:v=>v+'%'},
  zoom:    {label:'확대',   min:100, max:300, get:()=>Math.round(state.photo.zoom*100),  set:v=>{state.photo.zoom=v/100; renderPhoto();},  fmt:v=>v+'%'},
  radius:  {label:'모서리', min:0,   max:80,  get:()=>state.photo.radius,                set:v=>{state.photo.radius=v; renderPhoto();},    fmt:v=>String(v)},
  metaSize:{label:'크기',   min:60,  max:160, get:()=>Math.round(state.metaOpts.sizeMul*100), set:v=>{state.metaOpts.sizeMul=v/100; syncMetaTexts(false);}, fmt:v=>v+'%'},
  textSize:{label:'크기',   min:24,  max:160, get:()=>Math.round(selText()?.size ?? textStyle.size), set:v=>{textStyle.size=v; applyToSelected(t=>{t.size=v; t.userStyled=true;});}, fmt:v=>String(v)},
  blur:    {label:'블러',   min:0,   max:120, get:()=>state.bg.blur,                     set:v=>{state.bg.blur=v; renderBg();},            fmt:v=>String(v)},
  dim:     {label:'어둡기', min:0,   max:70,  get:()=>Math.round(state.bg.dim*100),      set:v=>{state.bg.dim=v/100; renderBg();},         fmt:v=>v+'%'},
};

const dockRow = $('#dockRow'), dockSliderEl = $('#dockSlider'), dockAltEl = $('#dockAlt');

function mkChip(label, {on=false, act=false, cb}={}){
  const b = document.createElement('button');
  b.className = 'chip-btn' + (on ? ' on' : '') + (act ? ' act' : '');
  b.innerHTML = label;
  b.onclick = cb;
  return b;
}
function mkDot(color, on, cb){
  const b = document.createElement('button');
  b.className = 'dot' + (on ? ' on' : '');
  b.style.background = color;
  b.onclick = cb;
  return b;
}
function customDot(cb){
  const l = document.createElement('label');
  l.className = 'dot custom'; l.textContent = '🎨';
  const i = document.createElement('input'); i.type = 'color';
  i.oninput = ()=>cb(i.value);
  l.appendChild(i);
  return l;
}
function openSlider(key){ dockAltKey = null; dockParam = dockParam===key ? null : key; renderDock(); }
function openAlt(key){ dockParam = null; dockAltKey = dockAltKey===key ? null : key; renderDock(); }
function refreshDockSlider(){
  if(!dockParam || dockSliderEl.hidden) return;
  const s = SLIDERS[dockParam];
  $('#dsRange').value = s.get();
  $('#dsVal').textContent = s.fmt(s.get());
}

const DATE_SAMPLES = {dot:'2026. 7. 4 (sat)', kor:'7월 4일 (토)', eng:'JUL 4 (SAT)', short:'26. 7. 4'};

function renderDock(){
  dockRow.innerHTML = '';
  const add = (label, o) => dockRow.appendChild(mkChip(label, o));
  const p = state.photo, o = state.metaOpts, b = state.bg;
  const t = selText();

  if(activeTab === 'photo'){
    add('🖼 선택', {cb:()=>$('#fileInput').click()});
    for(const r of ['3:4','4:5','1:1','4:3','orig'])
      add(r==='orig'?'원본':r, {on:p.ratio===r, cb:()=>{ p.ratio=r; p.ox=0; p.oy=0; relayoutAll(); renderDock(); }});
    add('↺', {cb:()=>rotatePhoto(-1)});
    add('↻', {cb:()=>rotatePhoto(1)});
    for(const k of ['width','zoom','radius'])
      add(SLIDERS[k].label, {act:dockParam===k, cb:()=>openSlider(k)});
    add('구도 초기화', {cb:()=>{ p.zoom=1; p.ox=0; p.oy=0; renderPhoto(); refreshDockSlider(); }});
    add(state.export.scale===1?'1080p':'2160p', {cb:()=>{ state.export.scale = state.export.scale===1?2:1; renderDock(); }});
    add(state.export.fmt.toUpperCase(), {cb:()=>{ state.export.fmt = state.export.fmt==='jpg'?'png':'jpg'; renderDock(); }});
  }
  else if(activeTab === 'meta'){
    // 무엇을 보여줄지: 항목 on/off + 날짜 표기
    const labels = {datetime:'날짜', location:'위치', camera:'기기', detail:'상세'};
    for(const k of ['datetime','location','camera','detail'])
      add(labels[k], {on:o.show[k], cb:()=>{ o.show[k] = !o.show[k]; syncMetaTexts(true); }});
    const fmts = ['dot','kor','eng','short'];
    add('🗓 '+DATE_SAMPLES[o.dateFormat], {cb:()=>{ o.dateFormat = fmts[(fmts.indexOf(o.dateFormat)+1)%fmts.length]; syncMetaTexts(false); }});
    add('시간', {on:o.showTime, cb:()=>{ o.showTime = !o.showTime; syncMetaTexts(false); }});
    add('⭐ 기본값 저장', {cb:saveDefaults});
  }
  else if(activeTab === 'layout'){
    // 어떻게 배치할지: 위치 프리셋 + 정보 텍스트 스타일
    const presets = {below:'사진 아래', above:'사진 위', split:'위·아래'};
    for(const k in presets)
      add(presets[k], {on:o.preset===k, cb:()=>{ o.preset=k; applyPresetOrds(); relayoutAll(); renderDock(); }});
    add('폰트', {act:dockAltKey==='font-meta', cb:()=>openAlt('font-meta')});
    add('크기', {act:dockParam==='metaSize', cb:()=>openSlider('metaSize')});
    add(o.color==='#ffffff'?'색: 흰':'색: 검', {cb:()=>{ o.color = o.color==='#ffffff'?'#111111':'#ffffff'; syncMetaTexts(false); }});
    add('⭐ 기본값 저장', {cb:saveDefaults});
  }
  else if(activeTab === 'text'){
    add('＋ 추가', {cb:addNewText});
    add('폰트', {act:dockAltKey==='font-text', cb:()=>openAlt('font-text')});
    add('크기', {act:dockParam==='textSize', cb:()=>openSlider('textSize')});
    add('색상', {act:dockAltKey==='color-text', cb:()=>openAlt('color-text')});
    const pills = {none:'배경 없음', dark:'배경 어둡게', light:'배경 밝게'};
    const curPill = t ? (t.pill||'none') : textStyle.pill;
    add(pills[curPill], {cb:()=>{
      const ks = Object.keys(pills);
      const nx = ks[(ks.indexOf(curPill)+1)%ks.length];
      textStyle.pill = nx; applyToSelected(x=>x.pill=nx); renderDock();
    }});
    const curA = t ? t.align : textStyle.align;
    add(curA==='center'?'☰ 가운데':'☰ 왼쪽', {cb:()=>{
      const nx = curA==='center'?'left':'center';
      textStyle.align = nx; applyToSelected(x=>x.align=nx); renderDock();
    }});
    if(t) add('🗑 삭제', {cb:()=>$('#delSelBtn').click()});
  }
  else if(activeTab === 'bg'){
    const modes = {blur:'사진 블러', color:'단색', gradient:'그라데이션'};
    for(const k in modes)
      add(modes[k], {on:b.mode===k, cb:()=>{
        b.mode = k; renderBg();
        dockParam = null;
        dockAltKey = k==='color' ? 'color-bg' : null;
        renderDock();
      }});
    if(b.mode==='blur'){
      add('블러', {act:dockParam==='blur', cb:()=>openSlider('blur')});
      add('어둡기', {act:dockParam==='dim', cb:()=>openSlider('dim')});
    }
    if(b.mode==='color')
      add('컬러', {act:dockAltKey==='color-bg', cb:()=>openAlt('color-bg')});
    if(b.mode==='gradient'){
      add('🎨 사진에서 추출', {cb:gradFromPhoto});
      add('위 색', {cb:()=>pickColor(c=>{ b.c1=c; renderBg(); })});
      add('아래 색', {cb:()=>pickColor(c=>{ b.c2=c; renderBg(); })});
    }
  }

  // 2행: 슬라이더 또는 보조 칩
  dockSliderEl.hidden = !dockParam;
  if(dockParam){
    const s = SLIDERS[dockParam];
    $('#dsLabel').textContent = s.label;
    const r = $('#dsRange');
    r.min = s.min; r.max = s.max; r.value = s.get();
    $('#dsVal').textContent = s.fmt(s.get());
    r.oninput = ()=>{ s.set(+r.value); $('#dsVal').textContent = s.fmt(+r.value); };
  }
  dockAltEl.hidden = !dockAltKey;
  if(dockAltKey) renderDockAlt();
  setTimeout(fitStage, 30);
}

function renderDockAlt(){
  dockAltEl.innerHTML = '';
  const add = el => dockAltEl.appendChild(el);
  if(dockAltKey === 'font-meta' || dockAltKey === 'font-text'){
    const isMeta = dockAltKey === 'font-meta';
    const cur = isMeta ? state.metaOpts.font : (selText()?.font || textStyle.font);
    for(const f of FONTS){
      const chip = mkChip(f.label, {on:cur===f.key, cb:()=>{
        if(isMeta){ state.metaOpts.font = f.key; syncMetaTexts(false); }
        else { textStyle.font = f.key; applyToSelected(t=>{ t.font=f.key; t.userStyled=true; }); }
        renderDockAlt();
      }});
      chip.style.fontFamily = `'${f.family}', sans-serif`;
      chip.style.fontSize = '15px';
      add(chip);
    }
  } else if(dockAltKey === 'color-text'){
    const cur = selText()?.color || textStyle.color;
    for(const c of TEXT_COLORS)
      add(mkDot(c, cur===c, ()=>{ textStyle.color=c; applyToSelected(t=>{t.color=c; t.userStyled=true;}); renderDockAlt(); }));
    add(customDot(c=>{ textStyle.color=c; applyToSelected(t=>{t.color=c; t.userStyled=true;}); }));
  } else if(dockAltKey === 'color-bg'){
    for(const c of BG_COLORS)
      add(mkDot(c, state.bg.color===c, ()=>{ state.bg.color=c; renderBg(); renderDockAlt(); }));
    add(customDot(c=>{ state.bg.color=c; renderBg(); }));
  }
}

// 숨은 컬러 피커 (그라데이션 색 지정)
function pickColor(cb){
  const i = document.createElement('input');
  i.type = 'color';
  i.style.cssText = 'position:fixed;left:-100px;top:0;opacity:0';
  document.body.appendChild(i);
  i.oninput = ()=>cb(i.value);
  i.onchange = ()=>setTimeout(()=>i.remove(), 500);

// 인스타그램 스타일: 추가하면 바로 캔버스에서 입력 시작
function addNewText(){
  const maxOrd = Math.max(0, ...state.texts.map(x=>x.ord??0));
  const t = { id:'t'+(idSeq++), kind:'user', text:'텍스트', x:CW/2, y:CH/2, ord:maxOrd+1,
    size:textStyle.size, font:textStyle.font, weight:500, color:textStyle.color,
    pill:textStyle.pill, align:textStyle.align };
  state.texts.push(t);
  state.selected = t.id;
  relayoutAll();
  startEdit(t.id);
}

// 텍스트를 선택하면 텍스트 탭으로 전환해 해당 스타일 칩 표시
function syncTextPanel(t){
  if(!t) return;
  if(activeTab !== 'text') setTab('text');
  else renderDock();
}

function setTab(name){
  activeTab = name;
  dockParam = null; dockAltKey = null;
  $$('#tabbar button').forEach(b=>b.classList.toggle('on', b.dataset.tab===name));
  renderDock();
}
$$('#tabbar button').forEach(b=> b.onclick = ()=>setTab(b.dataset.tab));

// 90° 회전 — 화질 누적 손실이 없도록 항상 원본에서 누적 각도로 한 번에 회전
let rotating = false;
async function rotatePhoto(dir){
  const p = state.photo;
  if(!p.original || rotating) return;
  rotating = true;
  try{
    p.rot = ((p.rot||0) + (dir > 0 ? 90 : 270)) % 360;
    const map = {0:1, 90:6, 180:3, 270:8};
    p.img = p.rot === 0 ? p.original : await orientImage(p.original, map[p.rot]);
    p.ox = 0; p.oy = 0;
    renderBg(); relayoutAll();
  } finally { rotating = false; }
}

// 사진 상/하단 평균색으로 그라데이션 추출
function gradFromPhoto(){
  const img = state.photo.img;
  if(!img){ toast('먼저 사진을 선택해 주세요'); return; }
  const c = document.createElement('canvas'); c.width = 8; c.height = 8;
  const x = c.getContext('2d', {willReadFrequently:true});
  x.drawImage(img, 0, 0, 8, 8);
  const d = x.getImageData(0,0,8,8).data;
  const avg = rows => {
    let r=0,g=0,bl=0,n=0;
    for(const row of rows) for(let i=0;i<8;i++){ const off=(row*8+i)*4; r+=d[off]; g+=d[off+1]; bl+=d[off+2]; n++; }
    const hex = v => Math.round(v/n).toString(16).padStart(2,'0');
    return '#'+hex(r)+hex(g)+hex(bl);
  };
  state.bg.c1 = avg([0,1,2]); state.bg.c2 = avg([5,6,7]);
  renderBg();
  toast('사진 색으로 그라데이션을 만들었어요');
}

/* =====================================================
   내보내기 (캔버스 렌더)
===================================================== */
function roundRectPath(ctx,x,y,w,h,r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawCover(ctx, img, w, h, zoom){
  const s = Math.max(w/img.naturalWidth, h/img.naturalHeight) * (zoom||1);
  const dw = img.naturalWidth*s, dh = img.naturalHeight*s;
  ctx.drawImage(img, (w-dw)/2, (h-dh)/2, dw, dh);
}

function canvasFilterSupported(){
  const c = document.createElement('canvas').getContext('2d');
  c.filter = 'blur(2px)';
  return c.filter === 'blur(2px)';
}

function drawBlurredBg(ctx, img){
  const b = state.bg;
  if(b.blur > 0 && canvasFilterSupported()){
    ctx.save();
    ctx.filter = `blur(${b.blur}px)`;
    drawCover(ctx, img, CW, CH, 1.18);
    ctx.restore();
  } else if(b.blur > 0){
    // 폴백: 다운스케일 반복으로 블러 근사
    const steps = Math.max(1, Math.min(4, Math.round(b.blur/18)));
    let src = img, sw = img.naturalWidth, sh = img.naturalHeight;
    for(let i=0;i<steps;i++){
      const c = document.createElement('canvas');
      c.width = Math.max(8, Math.round(sw/4)); c.height = Math.max(8, Math.round(sh/4));
      const x = c.getContext('2d');
      x.drawImage(src, 0, 0, c.width, c.height);
      src = c; sw = c.width; sh = c.height;
    }
    ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
    const s = Math.max(CW/sw, CH/sh)*1.18;
    ctx.drawImage(src, (CW-sw*s)/2, (CH-sh*s)/2, sw*s, sh*s);
  } else {
    drawCover(ctx, img, CW, CH, 1.18);
  }
  if(b.dim > 0){
    ctx.fillStyle = `rgba(0,0,0,${b.dim})`;
    ctx.fillRect(0,0,CW,CH);
  }
}

function drawTextEl(ctx, t){
  const family = fontFamily(t.font);
  ctx.font = `${t.weight||400} ${t.size}px "${family}", sans-serif`;
  ctx.textBaseline = 'middle';
  const lines = t.text.split('\n');
  const lh = t.size*1.35;
  const blockH = lines.length*lh;
  const maxW = Math.max(...lines.map(l=>ctx.measureText(l).width));
  const padX = t.size*0.45, padY = t.size*0.25;
  const top = t.y - blockH/2;

  if(t.pill && t.pill!=='none'){
    ctx.save();
    ctx.fillStyle = t.pill==='dark' ? 'rgba(0,0,0,.55)' : 'rgba(255,255,255,.92)';
    const bx = t.align==='left' ? t.x : t.x - maxW/2 - padX;
    roundRectPath(ctx, bx, top - padY, maxW + padX*2, blockH + padY*2, t.size*0.35);
    ctx.fill();
    ctx.restore();
  } else {
    ctx.shadowColor = 'rgba(0,0,0,.35)';
    ctx.shadowBlur = 12; ctx.shadowOffsetY = 2;
  }
  ctx.fillStyle = t.color;
  ctx.textAlign = t.align==='left' ? 'left' : 'center';
  const tx = t.align==='left' ? t.x + (t.pill&&t.pill!=='none'?padX:0) : t.x;
  lines.forEach((line,i)=>{
    ctx.fillText(line, tx, top + lh*i + lh/2);
  });
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
}

async function ensureFonts(){
  const used = new Set(state.texts.filter(t=>!t.hidden).map(t=>t.font));
  const loads = [];
  for(const key of used){
    const fam = fontFamily(key);
    for(const w of [400,500,700]) loads.push(document.fonts.load(`${w} 32px "${fam}"`, '한글Ag1'));
  }
  await Promise.allSettled(loads);
  await document.fonts.ready;
}

async function exportImage(){
  if(!state.photo.img && !state.texts.length){ toast('먼저 사진을 선택해 주세요'); return null; }
  await ensureFonts();
  const mult = state.export.scale;
  const canvas = document.createElement('canvas');
  canvas.width = CW*mult; canvas.height = CH*mult;
  const ctx = canvas.getContext('2d');
  ctx.scale(mult, mult);
  ctx.imageSmoothingQuality = 'high';

  // 배경
  const b = state.bg;
  if(b.mode==='color'){ ctx.fillStyle = b.color; ctx.fillRect(0,0,CW,CH); }
  else if(b.mode==='gradient'){
    const g = ctx.createLinearGradient(0,0,0,CH);
    g.addColorStop(0,b.c1); g.addColorStop(1,b.c2);
    ctx.fillStyle = g; ctx.fillRect(0,0,CW,CH);
  }
  else if(state.photo.img){ drawBlurredBg(ctx, state.photo.img); }
  else { ctx.fillStyle = '#1a1a20'; ctx.fillRect(0,0,CW,CH); }

  // 사진 (카드 크롭 — 미리보기와 동일한 계산)
  if(state.photo.img){
    const p = state.photo;
    const { card:r } = computeLayout();
    ctx.save();
    roundRectPath(ctx, r.left, r.top, r.w, r.h, p.radius);
    ctx.clip();
    const bs = Math.max(r.w/p.img.naturalWidth, r.h/p.img.naturalHeight) * p.zoom;
    const dw = p.img.naturalWidth*bs, dh = p.img.naturalHeight*bs;
    ctx.drawImage(p.img, r.left + (r.w-dw)/2 + p.ox, r.top + (r.h-dh)/2 + p.oy, dw, dh);
    ctx.restore();
  }
  // 텍스트
  for(const t of state.texts) if(!t.hidden) drawTextEl(ctx, t);

  const fmt = state.export.fmt;
  return new Promise(ok=>canvas.toBlob(ok, fmt==='png'?'image/png':'image/jpeg', 0.95));
}

function exportName(){
  const d = state.meta.date || new Date();
  const p2 = n=>String(n).padStart(2,'0');
  return `PokaChip_${String(d.getFullYear()).slice(2)}${p2(d.getMonth()+1)}${p2(d.getDate())}_${p2(d.getHours())}${p2(d.getMinutes())}.${state.export.fmt}`;
}

$('#saveBtn').onclick = async ()=>{
  toast('이미지 생성 중…');
  const blob = await exportImage(); if(!blob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = exportName();
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  toast('저장했어요 ✅');
};

// Web Share (모바일: 인스타그램으로 바로 공유)
if(navigator.canShare){
  try{
    const testFile = new File([''], 't.jpg', {type:'image/jpeg'});
    if(navigator.canShare({files:[testFile]})) $('#shareBtn').style.display = '';
  }catch(e){}
}
$('#shareBtn').onclick = async ()=>{
  const blob = await exportImage(); if(!blob) return;
  const file = new File([blob], exportName(), {type:blob.type});
  try{ await navigator.share({files:[file]}); }
  catch(e){ /* 사용자가 취소 */ }
};

// 키보드
addEventListener('keydown', e=>{
  if(e.target.matches('input,textarea,[contenteditable]')) return;
  if((e.key==='Delete'||e.key==='Backspace') && state.selected){ $('#delSelBtn').click(); }
  if(e.key==='Escape'){ state.selected=null; renderTexts(); }
});

/* ---------- 초기화 ---------- */
loadDefaults();
setTab('photo');
renderAll();
renderMetaList();
fitStage();
</script>
